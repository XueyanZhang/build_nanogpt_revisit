<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 940" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="embedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#88d8b0"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd3b6"/>
      <stop offset="100%" stop-color="#ffaaa5"/>
    </linearGradient>
    <linearGradient id="mlpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5d8ff"/>
      <stop offset="100%" stop-color="#89b8f8"/>
    </linearGradient>
    <linearGradient id="normGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8daef"/>
      <stop offset="100%" stop-color="#d2b4de"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9e79f"/>
      <stop offset="100%" stop-color="#f4d03f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="940" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="260" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">GPT-2 (124M) Architecture</text>
  <text x="260" y="55" text-anchor="middle" font-size="12" fill="#888">Decoder-Only Transformer</text>

  <!-- ==================== OUTPUT (top) ==================== -->
  <!-- Output Probabilities -->
  <rect x="160" y="75" width="200" height="38" rx="8" fill="url(#headGrad)" stroke="#c9a800" stroke-width="1.5"/>
  <text x="260" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Output Probabilities</text>

  <!-- Line: Softmax -> Output -->
  <line x1="260" y1="120" x2="260" y2="113" stroke="#555" stroke-width="1.5"/>

  <!-- Softmax -->
  <rect x="175" y="120" width="170" height="30" rx="6" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
  <text x="260" y="140" text-anchor="middle" font-size="12" fill="#555">Softmax</text>

  <!-- Line: lm_head -> Softmax -->
  <line x1="260" y1="157" x2="260" y2="150" stroke="#555" stroke-width="1.5"/>

  <!-- lm_head -->
  <rect x="150" y="157" width="220" height="38" rx="8" fill="url(#headGrad)" stroke="#c9a800" stroke-width="1.5"/>
  <text x="260" y="176" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">lm_head</text>
  <text x="260" y="190" text-anchor="middle" font-size="10" fill="#666">Linear(768 → 50304)</text>

  <!-- Line: ln_f -> lm_head -->
  <line x1="260" y1="202" x2="260" y2="195" stroke="#555" stroke-width="1.5"/>

  <!-- Final LayerNorm -->
  <rect x="165" y="202" width="190" height="30" rx="6" fill="url(#normGrad)" stroke="#8e44ad" stroke-width="1.2"/>
  <text x="260" y="221" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">LayerNorm (ln_f)</text>

  <!-- Arrow: MLP Add (+) -> ln_f -->
  <line x1="260" y1="268" x2="260" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Transformer Block ==================== -->
  <!-- Block border -->
  <rect x="60" y="245" width="400" height="417" rx="12" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="260" text-anchor="end" font-size="12" font-weight="bold" fill="#888">× 12</text>
  <text x="80" y="260" text-anchor="start" font-size="13" font-weight="bold" fill="#666">Transformer Block</text>

  <!-- MLP Sub-block -->
  <rect x="100" y="265" width="320" height="176" rx="10" fill="#eef5ff" stroke="#89b8f8" stroke-width="1.2"/>
  <text x="115" y="283" font-size="11" font-weight="bold" fill="#5b8def">MLP</text>

  <!-- Residual for MLP: branch at y=441 (before ln_2), bypass to + at y=280 -->
  <line x1="260" y1="441" x2="400" y2="441" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="441" x2="400" y2="280" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="280" x2="272" y2="280" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <circle cx="260" cy="441" r="3" fill="#e74c3c"/>

  <!-- Add circle for MLP residual -->
  <circle cx="260" cy="280" r="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="260" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">+</text>

  <!-- Line: c_proj(MLP) -> Add -->
  <line x1="260" y1="298" x2="260" y2="292" stroke="#555" stroke-width="1.5"/>

  <!-- c_proj (MLP) -->
  <rect x="155" y="298" width="210" height="32" rx="6" fill="url(#mlpGrad)" stroke="#5b8def" stroke-width="1.2"/>
  <text x="260" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">c_proj</text>
  <text x="260" y="326" text-anchor="middle" font-size="9" fill="#555">Linear(3072 → 768)</text>

  <!-- Line: GELU -> c_proj -->
  <line x1="260" y1="336" x2="260" y2="330" stroke="#555" stroke-width="1.5"/>

  <!-- GELU -->
  <rect x="185" y="336" width="150" height="28" rx="6" fill="#fff" stroke="#5b8def" stroke-width="1.2"/>
  <text x="260" y="354" text-anchor="middle" font-size="12" fill="#555">GELU</text>

  <!-- Line: c_fc -> GELU -->
  <line x1="260" y1="370" x2="260" y2="364" stroke="#555" stroke-width="1.5"/>

  <!-- c_fc -->
  <rect x="155" y="370" width="210" height="32" rx="6" fill="url(#mlpGrad)" stroke="#5b8def" stroke-width="1.2"/>
  <text x="260" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">c_fc</text>
  <text x="260" y="398" text-anchor="middle" font-size="9" fill="#555">Linear(768 → 3072)</text>

  <!-- Line: ln_2 -> c_fc -->
  <line x1="260" y1="408" x2="260" y2="402" stroke="#555" stroke-width="1.5"/>

  <!-- LayerNorm 2 -->
  <rect x="175" y="408" width="170" height="28" rx="6" fill="url(#normGrad)" stroke="#8e44ad" stroke-width="1.2"/>
  <text x="260" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">LayerNorm (ln_2)</text>

  <!-- Line: Attention Add -> ln_2 -->
  <line x1="260" y1="454" x2="260" y2="436" stroke="#555" stroke-width="1.5"/>

  <!-- Attention Sub-block -->
  <rect x="100" y="451" width="320" height="198" rx="10" fill="#fff5ee" stroke="#ffaaa5" stroke-width="1.2"/>
  <text x="115" y="469" font-size="11" font-weight="bold" fill="#e07b5a">Causal Self-Attention</text>

  <!-- Residual for Attention: branch at y=649 (before ln_1), bypass to + at y=466 -->
  <line x1="260" y1="649" x2="400" y2="649" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="649" x2="400" y2="466" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="466" x2="272" y2="466" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <circle cx="260" cy="649" r="3" fill="#e74c3c"/>

  <!-- Add circle for Attention residual -->
  <circle cx="260" cy="466" r="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="260" y="471" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">+</text>

  <!-- Line: c_proj(attn) -> Add -->
  <line x1="260" y1="484" x2="260" y2="478" stroke="#555" stroke-width="1.5"/>

  <!-- c_proj (attention) -->
  <rect x="155" y="484" width="210" height="28" rx="6" fill="url(#attnGrad)" stroke="#e07b5a" stroke-width="1.2"/>
  <text x="260" y="501" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">c_proj  <tspan font-size="9" fill="#555">Linear(768 → 768)</tspan></text>

  <!-- Line: Concat -> c_proj -->
  <line x1="260" y1="518" x2="260" y2="512" stroke="#555" stroke-width="1.5"/>

  <!-- Concat Heads -->
  <rect x="175" y="518" width="170" height="24" rx="6" fill="#fff" stroke="#e07b5a" stroke-width="1"/>
  <text x="260" y="534" text-anchor="middle" font-size="10" fill="#666">Concat Heads (12)</text>

  <!-- Line: Flash Attention -> Concat -->
  <line x1="260" y1="548" x2="260" y2="542" stroke="#555" stroke-width="1.5"/>

  <!-- Flash Attention -->
  <rect x="140" y="548" width="240" height="28" rx="6" fill="url(#attnGrad)" stroke="#e07b5a" stroke-width="1.2"/>
  <text x="260" y="566" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Flash Attention <tspan font-size="9" fill="#555">(causal)</tspan></text>

  <!-- Line: c_attn -> Flash Attention -->
  <line x1="260" y1="582" x2="260" y2="576" stroke="#555" stroke-width="1.5"/>

  <!-- c_attn (Q, K, V) -->
  <rect x="140" y="582" width="240" height="28" rx="6" fill="url(#attnGrad)" stroke="#e07b5a" stroke-width="1.2"/>
  <text x="260" y="600" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">c_attn → Q, K, V  <tspan font-size="9" fill="#555">Linear(768 → 2304)</tspan></text>

  <!-- Line: ln_1 -> c_attn -->
  <line x1="260" y1="616" x2="260" y2="610" stroke="#555" stroke-width="1.5"/>

  <!-- LayerNorm 1 -->
  <rect x="175" y="616" width="170" height="28" rx="6" fill="url(#normGrad)" stroke="#8e44ad" stroke-width="1.2"/>
  <text x="260" y="634" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">LayerNorm (ln_1)</text>

  <!-- Arrow: Embeddings Add -> Block (ln_1) -->
  <line x1="260" y1="666" x2="260" y2="644" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== EMBEDDINGS (bottom) ==================== -->

  <!-- Add circle for embeddings -->
  <circle cx="260" cy="680" r="14" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="260" y="685" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">+</text>

  <!-- Token Embedding (left) -->
  <rect x="80" y="710" width="170" height="42" rx="8" fill="url(#embedGrad)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="729" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Token Embedding</text>
  <text x="165" y="744" text-anchor="middle" font-size="9" fill="#555">wte (50304 × 768)</text>

  <!-- Position Embedding (right) -->
  <rect x="270" y="710" width="170" height="42" rx="8" fill="url(#embedGrad)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="355" y="729" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Position Embedding</text>
  <text x="355" y="744" text-anchor="middle" font-size="9" fill="#555">wpe (1024 × 768)</text>

  <!-- Arrows from embeddings to add -->
  <line x1="165" y1="710" x2="250" y2="690" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="355" y1="710" x2="270" y2="690" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from input to token embedding -->
  <line x1="165" y1="775" x2="165" y2="752" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow from positions to pos embedding -->
  <line x1="355" y1="775" x2="355" y2="752" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input Tokens -->
  <rect x="95" y="775" width="140" height="34" rx="8" fill="#ddd" stroke="#999" stroke-width="1.2"/>
  <text x="165" y="797" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Input Tokens</text>

  <!-- Positions -->
  <rect x="285" y="775" width="140" height="34" rx="8" fill="#ddd" stroke="#999" stroke-width="1.2"/>
  <text x="355" y="797" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Positions (0..T)</text>

  <!-- Dimension annotations -->
  <text x="260" y="835" text-anchor="middle" font-size="11" fill="#aaa">B = batch size, T = seq length (≤1024), C = 768</text>
  <text x="260" y="853" text-anchor="middle" font-size="11" fill="#aaa">12 layers, 12 heads, head_dim = 64</text>

  <!-- Legend -->
  <rect x="60" y="870" width="400" height="55" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="75" y="883" width="14" height="14" rx="3" fill="url(#embedGrad)" stroke="#27ae60" stroke-width="0.8"/>
  <text x="95" y="894" font-size="10" fill="#666">Embedding</text>
  <rect x="160" y="883" width="14" height="14" rx="3" fill="url(#attnGrad)" stroke="#e07b5a" stroke-width="0.8"/>
  <text x="180" y="894" font-size="10" fill="#666">Attention</text>
  <rect x="240" y="883" width="14" height="14" rx="3" fill="url(#mlpGrad)" stroke="#5b8def" stroke-width="0.8"/>
  <text x="260" y="894" font-size="10" fill="#666">MLP</text>
  <rect x="300" y="883" width="14" height="14" rx="3" fill="url(#normGrad)" stroke="#8e44ad" stroke-width="0.8"/>
  <text x="320" y="894" font-size="10" fill="#666">LayerNorm</text>
  <rect x="390" y="883" width="14" height="14" rx="3" fill="url(#headGrad)" stroke="#c9a800" stroke-width="0.8"/>
  <text x="410" y="894" font-size="10" fill="#666">Head</text>
  <line x1="75" y1="913" x2="100" y2="913" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="108" y="917" font-size="10" fill="#666">Residual Connection</text>

  <!-- Weight tying annotation -->
  <line x1="150" y1="176" x2="45" y2="176" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="45" y1="176" x2="45" y2="731" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="45" y1="731" x2="80" y2="731" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="30" y="450" text-anchor="middle" font-size="9" fill="#27ae60" transform="rotate(-90, 30, 450)">weight tying</text>

</svg>